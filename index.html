<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绒颜工艺馆</title>
    <!-- Favicon图标设置 -->
    <link rel="icon" href="shangbiao.png" type="image/png">
    
    <style>
        /* 全局样式设置 */
        body {
            /* 背景颜色设置为棕色 (你可以根据需要调整色值，比如 #8B4513 是更深的棕) */
            background-color: #8B4513; 
            /* 字体设置为宋体 */
            font-family: "SimSun", "Songti SC", serif;
            margin: 0;
            padding: 20px;
            color: #333; /* 文字颜色深灰，保证阅读清晰 */
            
            /* 让页面内容垂直水平居中显示（可选，为了让卡片在屏幕中间） */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 主容器卡片样式 */
        .container {
            background-color: #ffffff; /* 卡片背景为白色 */
            width: 100%;
            max-width: 600px; /* 限制最大宽度 */
            padding: 40px;
            border-radius: 10px; /* 圆角 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); /* 阴影 */
            text-align: center; /* 默认所有元素居中 */
        }

        /* 大标题样式 */
        h1.main-title {
            font-size: 36px;
            margin-bottom: 10px;
            color: #5D4037; /* 深棕色标题，呼应背景 */
        }

        /* 小标题样式 */
        h2.sub-title {
            font-size: 20px;
            margin-bottom: 30px;
            font-weight: normal;
            color: #666;
        }

        /* 内容段落样式 */
        .content-text {
            font-size: 16px;
            line-height: 1.8;
            text-align: left; /* 文字左对齐 */
            text-indent: 2em; /* 【关键点】首行缩进2字符 */
            margin-bottom: 30px;
        }

        /* 图片样式 */
        .product-image {
            width: 100%; /* 图片宽度占满容器 */
            max-width: 400px; /* 限制图片最大宽度，防止太大 */
            height: auto;
            border-radius: 5px;
            margin-bottom: 30px;
            display: block;
            margin-left: auto; /* 配合margin-right实现居中 */
            margin-right: auto;
        }

        /* 按钮链接样式 */
        .btn-link {
            display: inline-block;
            background-color: #8B4513; /* 按钮背景也是棕色 */
            color: white;
            text-decoration: none; /* 去掉下划线 */
            padding: 12px 30px;
            border-radius: 25px; /* 圆角按钮 */
            font-size: 16px;
            transition: background-color 0.3s;
        }

        /* 鼠标悬停在按钮上的效果 */
        .btn-link:hover {
            background-color: #A0522D; /* 稍微变亮一点 */
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 大标题居中 -->
        <h1 class="main-title">绒颜工艺馆非遗·绒花·缠花</h1>
        
        <!-- 2. 小标题居中 -->
        <h2 class="sub-title">扬古韵今风，琢时光入软</h2>
        
        <!-- 3. 内容首行缩进两字符 -->
        <p class="content-text">
            这里是一处用绒花与缠花编织的诗意空间，每一件作品都承载着匠人的温度与时光的馈赠。我们以传统手工艺为根，以创新设计为翼，将千年非遗技艺与现代美学相融。
        </p>

        <!-- 4. 图片居中 (请替换 src 中的图片地址) -->
        <img src="my-photo.jpg" alt="我的照片"> <!-- 自定义图片 -->

        <!-- 5. 点击查看产品链接居中 -->
        <a href=" https://qr61.cn/opfHx6/qj3M323" class="btn-link">点击查看产品</a>
    </div>
