<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>扬州·绒花 | 缠花</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: #8B4513; /* 背景为褐色 */
    color: #fff;
    font-family: "SimSun", "宋体", "Microsoft YaHei", sans-serif;
    line-height: 1.6;
    padding: 20px;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  /* 顶部导航栏样式 */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    margin-bottom: 30px;
    flex-wrap: wrap; /* 允许内部元素在小屏幕上换行 */
  }

  /* 名称和电话各自占据一行（在小屏幕上），在宽屏幕上并排 */
  .site-title, .contact-phone {
    flex: 0 0 100%; /* 默认占据整行 */
    text-align: center;
    margin: 10px 0;
  }

  /* 副标题样式 */
  .subtitle {
    text-align: center;
    font-size: 1.5em;
    margin: 20px 0;
    word-wrap: break-word;
  }

  /* 通用产品区域样式 */
  .product-section {
    margin: 40px 0;
  }

  /* 通用标题卡片样式 (用于首页标题和产品区标题) */
  .section-title {
    text-align: center;
    font-size: 2em;
    margin-bottom: 20px;
    background-color: #F5F5DC; /* 米黄色背景，体现段落感 */
    color: #8B4513; /* 深褐色文字，与背景形成对比 */
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    font-family: "Microsoft YaHei", sans-serif;
  }

  /* 首页主标题和副标题也应用卡片样式 */
  .site-title, .subtitle {
    background-color: #F5F5DC;
    color: #8B4513;
    padding: 10px;
    border-radius: 8px;
    margin: 10px 0;
    font-family: "Microsoft YaHei", sans-serif;
  }

  /* 通用图片滚动容器样式 */
  .scroll-container {
    display: flex;
    overflow: hidden;
    padding: 10px 0;
  }

  /* 无缝滚动核心样式 */
  .scroll-list {
    display: flex;
    animation: scroll linear infinite;
    flex: 0 0 auto; /* 关键：防止图片被压缩 */
  }

  .scroll-list:hover {
    animation-play-state: paused;
  }

  .scroll-item {
    width: 200px;
    height: 200px;
    margin-right: 10px;
    border: 2px solid transparent;
    transition: border-color 0.3s;
    cursor: pointer;
  }

  .scroll-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
  }

  .scroll-item:hover {
    border-color: #fff;
  }

  /* 无缝滚动动画定义 */
  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  /* 页脚样式 */
  .footer {
    text-align: center;
    margin-top: 50px;
    padding: 20px 0;
    border-top: 1px solid rgba(255, 255, 255, 0.3);
    width: 100%;
    left: 0;
  }

  .contact-email {
    font-size: 1.2em;
    margin-top: 10px;
  }

  /* 全屏图片放大样式 */
  .fullscreen-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .fullscreen-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .fullscreen-image {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
  }

  /* 响应式布局调整 */
  @media (min-width: 769px) {
    /* 在宽屏幕上，让名称和电话并排显示 */
    .site-title, .contact-phone {
      flex: 0 0 auto;
      text-align: left;
      margin: 0;
    }
  }
</style>
</head>
<body>
<div class="container">
  <!-- 1. 顶部导航栏 -->
  <header class="header">
    <h1 class="site-title">扬州·绒花 | 缠花</h1>
    <div class="contact-phone">联系电话：0514-88888888</div>
  </header>

  <!-- 2. 副标题 -->
  <h2 class="subtitle">扬古韵今风，琢时光入软</h2>

  <!-- 3. 绒花馆区域 -->
  <section class="product-section">
    <h2 class="section-title">绒花馆</h2>
    <div class="scroll-container">
      <div class="scroll-list" id="scrollList1">
        <!-- 原始图片列表 -->
        <div class="scroll-item"><img src="R1.JPG" alt="绒花1"></div>
        <div class="scroll-item"><img src="R2.JPG" alt="绒花2"></div>
        <div class="scroll-item"><img src="R3.JPG" alt="绒花3"></div>
        <!-- 重复一次列表以实现无缝循环 -->
        <div class="scroll-item"><img src="R1.JPG" alt="绒花1"></div>
        <div class="scroll-item"><img src="R2.JPG" alt="绒花2"></div>
        <div class="scroll-item"><img src="R3.JPG" alt="绒花3"></div>
      </div>
    </div>
  </section>

  <!-- 4. 缠花馆区域 -->
  <section class="product-section">
    <h2 class="section-title">缠花馆</h2>
    <div class="scroll-container">
      <div class="scroll-list" id="scrollList2">
        <!-- 原始图片列表 -->
        <div class="scroll-item"><img src="https://via.placeholder.com/200/8B4513/FFFFFF?text=缠花1" alt="缠花1"></div>
        <div class="scroll-item"><img src="https://via.placeholder.com/200/8B4513/FFFFFF?text=缠花2" alt="缠花2"></div>
        <div class="scroll-item"><img src="https://via.placeholder.com/200/8B4513/FFFFFF?text=缠花3" alt="缠花3"></div>
        <!-- 重复一次列表以实现无缝循环 -->
        <div class="scroll-item"><img src="https://via.placeholder.com/200/8B4513/FFFFFF?text=缠花1" alt="缠花1"></div>
        <div class="scroll-item"><img src="https://via.placeholder.com/200/8B4513/FFFFFF?text=缠花2" alt="缠花2"></div>
        <div class="scroll-item"><img src="https://via.placeholder.com/200/8B4513/FFFFFF?text=缠花3" alt="缠花3"></div>
      </div>
    </div>
  </section>

  <!-- 5. 页脚信息 -->
  <footer class="footer">
    <div class="contact-email">联系邮箱：contact@example.com</div>
  </footer>
</div>

<!-- 6. 全屏放大图片的遮罩层 -->
<div class="fullscreen-overlay" id="fullscreenOverlay">
  <img src="" alt="全屏预览" class="fullscreen-image" id="fullscreenImage">
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const scrollItems = document.querySelectorAll('.scroll-item');
  const fullscreenOverlay = document.getElementById('fullscreenOverlay');
  const fullscreenImage = document.getElementById('fullscreenImage');
  const scrollLists = document.querySelectorAll('.scroll-list');

  // 1. 图片点击放大功能
  scrollItems.forEach(item => {
    item.addEventListener('click', function() {
      const imgSrc = this.querySelector('img').src;
      fullscreenImage.src = imgSrc;
      fullscreenOverlay.classList.add('active');
    });
  });

  // 2. 关闭全屏图片
  fullscreenOverlay.addEventListener('click', function(event) {
    if (event.target === this) {
      this.classList.remove('active');
    }
  });

  // 3. 移动端优化：点击任意位置暂停/恢复滚动
  let isPaused = false;
  document.body.addEventListener('click', function() {
    if (isPaused) {
      scrollLists.forEach(list => {
        list.style.animationPlayState = 'running';
      });
    } else {
      scrollLists.forEach(list => {
        list.style.animationPlayState = 'paused';
      });
    }
    isPaused = !isPaused;
  });
});
</script>

</body>
</html>
