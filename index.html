<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>扬州·绒花 | 缠花</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: #8B4513; /* 背景为褐色 */
    color: #fff;
    font-family: "SimSun", "宋体", "Microsoft YaHei", sans-serif; /* 字体为宋体 */
    line-height: 1.6;
    padding: 20px;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  /* 顶部导航栏样式 */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    margin-bottom: 30px;
  }

  .site-title {
    font-size: 1.8em;
    font-weight: bold;
  }

  .contact-phone {
    font-size: 1.2em;
  }

  /* 副标题样式 */
  .subtitle {
    text-align: center;
    font-size: 1.5em;
    margin: 20px 0;
  }

  /* 通用产品区域样式 */
  .product-section {
    margin: 40px 0;
  }

  .section-title {
    text-align: center;
    font-size: 2em;
    margin-bottom: 20px;
  }

  /* 通用图片滚动容器样式 */
  .scroll-container {
    display: flex;
    overflow-x: hidden; /* 隐藏横向滚动条 */
    padding: 10px 0;
    background-color: rgba(0, 0, 0, 0.2);
  }

  /* 通用图片列表样式 (横向排列) */
  .scroll-list {
    display: flex;
    transition: transform 0.5s ease-in-out;
  }

  /* 图片样式 */
  .scroll-item img {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 8px;
    margin: 0 10px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.3s;
  }

  .scroll-item img:hover {
    border-color: #fff;
  }

  /* 查看全部链接样式 */
  .view-all {
    display: block;
    text-align: center;
    margin: 30px 0;
    font-size: 1.2em;
    color: #fff;
    text-decoration: none;
  }

  .view-all:hover {
    text-decoration: underline;
  }

  /* 页脚样式 */
  .footer {
    text-align: center;
    margin-top: 50px;
    padding: 20px 0;
    border-top: 1px solid rgba(255, 255, 255, 0.3);
  }

  .contact-email {
    font-size: 1.2em;
  }

  /* 全屏图片放大样式 */
  .fullscreen-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .fullscreen-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .fullscreen-image {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
  }
</style>
</head>
<body>

<div class="container">
  <!-- 1. 顶部区域 (左上角名称, 右上角电话) -->
  <header class="header">
    <div class="site-title">扬州·绒花 | 缠花</div>
    <div class="contact-phone">联系电话: 138-8888-8888</div>
  </header>

  <!-- 2. 居中副标题 -->
  <h2 class="subtitle">扬古韵今风，琢时光入软</h2>

  <!-- 3. 绒花馆区域 -->
  <section class="product-section">
    <h3 class="section-title">绒花馆</h3>
    <div class="scroll-container" id="scrollContainer1">
      <div class="scroll-list" id="scrollList1">
        <div class="scroll-item"><img src="R1.JPG" alt="绒花1"></div>
        <div class="scroll-item"><img src="R2.JPG" alt="绒花2"></div>
        <div class="scroll-item"><img src="R3.JPG" alt="绒花3"></div>
        <div class="scroll-item"><img src="R4.JPG" alt="绒花4"></div>
        <div class="scroll-item"><img src="R5.JPG" alt="绒花5"></div>
      </div>
    </div>
  </section>

  <!-- 4. 缠花馆区域 -->
  <section class="product-section">
    <h3 class="section-title">缠花馆</h3>
    <div class="scroll-container" id="scrollContainer2">
      <div class="scroll-list" id="scrollList2">
        <div class="scroll-item"><img src="https://via.placeholder.com/200/8B4513/FFFFFF?text=缠花1" alt="缠花1"></div>
        <div class="scroll-item"><img src="https://via.placeholder.com/200/8B4513/FFFFFF?text=缠花2" alt="缠花2"></div>
        <div class="scroll-item"><img src="https://via.placeholder.com/200/8B4513/FFFFFF?text=缠花3" alt="缠花3"></div>
        <div class="scroll-item"><img src="https://via.placeholder.com/200/8B4513/FFFFFF?text=缠花4" alt="缠花4"></div>
        <div class="scroll-item"><img src="https://via.placeholder.com/200/8B4513/FFFFFF?text=缠花5" alt="缠花5"></div>
      </div>
    </div>
  </section>

  <!-- 5. 查看全部链接 -->
  <a href="#" class="view-all">查看全部</a>

  <!-- 6. 底部邮箱 -->
  <footer class="footer">
    <div class="contact-email">邮箱: yangzhou_ronghua@example.com</div>
  </footer>
</div>

<!-- 7. 全屏放大图片的遮罩层 -->
<div class="fullscreen-overlay" id="fullscreenOverlay">
  <img src="" alt="全屏预览" class="fullscreen-image" id="fullscreenImage">
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const scrollContainers = document.querySelectorAll('.scroll-container');
  let scrollIntervals = {};

  // 为每个滚动区域设置独立的自动滚动、悬停暂停和点击放大功能
  scrollContainers.forEach(container => {
    const list = container.querySelector('.scroll-list');
    const items = container.querySelectorAll('.scroll-item');
    let scrollAmount = 0;
    let totalVisibleWidth = 0;

    // 计算所有可见项的总宽度
    items.forEach(item => {
      totalVisibleWidth += item.offsetWidth + parseInt(window.getComputedStyle(item).marginRight);
    });

    function startScroll() {
      clearInterval(scrollIntervals[container.id]);
      scrollIntervals[container.id] = setInterval(() => {
        scrollAmount += 1; // 每次滚动1px
        if (scrollAmount >= totalVisibleWidth) {
          list.style.transform = 'translateX(0)';
          scrollAmount = 0;
        } else {
          list.style.transform = `translateX(-${scrollAmount}px)`;
        }
      }, 20);
    }

    container.addEventListener('mouseenter', () => {
      clearInterval(scrollIntervals[container.id]);
    });

    container.addEventListener('mouseleave', () => {
      startScroll();
    });

    // 3. 点击图片全屏放大
    items.forEach(item => {
      item.addEventListener('click', function() {
        const imgSrc = this.querySelector('img').src;
        const fullscreenOverlay = document.getElementById('fullscreenOverlay');
        const fullscreenImage = document.getElementById('fullscreenImage');
        
        fullscreenImage.src = imgSrc;
        fullscreenOverlay.classList.add('active');
      });
    });

    // 初始化自动滚动
    startScroll();
  });

  // 关闭全屏图片
  const fullscreenOverlay = document.getElementById('fullscreenOverlay');
  fullscreenOverlay.addEventListener('click', function(event) {
    if (event.target === this) {
      this.classList.remove('active');
    }
  });
});
</script>

</body>
</html>
