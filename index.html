<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>扬州·绒花｜缠花</title>
<style>
  /* 全局CSS变量，方便统一管理配色 */
  :root {
    --primary-text-color: #5a3921; /* 深棕色文字 */
    --background-color: #fdf9f0; /* 浅米色背景 */
    --accent-color: #c1440e; /* 强调色，用于链接等 */
  }

  /* 全局样式重置与设置 */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: "SimSun", "宋体", serif;
    line-height: 1.6;
    color: var(--primary-text-color);
    background-color: var(--background-color);
    padding: 20px;
  }
  a {
    color: var(--accent-color);
    transition: color 0.3s;
  }
  a:hover {
    color: darken(var(--accent-color), 10%);
    text-decoration: underline;
  }

  /* 顶部导航栏样式 */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    margin-bottom: 30px;
  }
  .site-title {
    font-size: 1.8em;
    font-weight: bold;
  }
  .contact-info {
    display: flex;
    gap: 15px;
  }

  /* 响应式规则：手机端样式 */
  @media (max-width: 768px) {
    .header {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .contact-info {
      width: 100%;
      justify-content: center;
      margin-top: 10px;
    }
    .site-title {
      text-align: center;
      width: 100%;
    }
  }

  /* 主内容区样式 */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
  }
  .subtitle {
    font-size: 1.4em;
    text-align: center;
    margin: 40px 0;
    color: var(--primary-text-color);
  }

  /* 画廊通用样式 */
  .gallery-section {
    margin: 50px 0;
  }
  .gallery-title {
    font-size: 1.6em;
    text-align: center;
    margin-bottom: 20px;
    color: var(--primary-text-color);
  }
  .gallery-container {
    overflow: hidden;
    position: relative;
    border: 1px solid #ddd;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  .gallery-track {
    display: flex;
    animation: scroll 30s linear infinite;
  }
  .gallery-track:hover {
    animation-play-state: paused;
  }
  .gallery-item {
    flex: 0 0 auto;
    width: 300px;
    height: 200px;
    cursor: pointer;
    transition: transform 0.3s;
    background-color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    font-style: italic;
    color: #888;
    border-right: 1px solid #eee;
  }
  .gallery-item:hover {
    transform: scale(1.05);
  }
  .gallery-item:last-child {
    border-right: none;
  }

  /* 横向滚动动画 */
  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* 查看全部链接样式 */
  .view-all {
    text-align: center;
    margin: 30px 0;
  }

  /* 底部样式 */
  footer {
    text-align: center;
    margin-top: 50px;
    padding: 20px;
    border-top: 1px solid #eee;
    color: var(--primary-text-color);
  }

  /* 图片全屏预览样式 */
  .fullscreen-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    cursor: pointer;
  }
  .fullscreen-image {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
  }
</style>
</head>
<body>

<!-- 顶部导航栏 -->

</div>

</html>
