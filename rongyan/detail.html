<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品详情</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">← 返回列表</a>
        
        <div class="detail-content">
            <!-- 多图滑动画廊区域 -->
            <div class="gallery-container">
                <div class="gallery-track" id="gallery-track">
                    <!-- JS 会在这里动态插入多张图片 -->
                </div>
                
                <!-- ✨ 新增：PC端左右切换箭头 -->
                <button class="gallery-arrow left-arrow" id="prev-btn">❮</button>
                <button class="gallery-arrow right-arrow" id="next-btn">❯</button>
                
                <!-- 底部小圆点指示器 -->
                <div class="gallery-indicators" id="gallery-indicators"></div>
            </div>
            
            <div class="detail-info">
                <h1 id="detail-title">加载中...</h1>
                <p class="detail-price" id="detail-price">¥0</p>
                <div class="detail-desc">
                    <h3>商品详情</h3>
                    <p id="detail-description">暂无描述</p>
                </div>
                <button class="buy-btn">立即购买</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
