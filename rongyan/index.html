<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>我的饰品店</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="home">
  <header>
    <h1>我的饰品店</h1>
    <nav>
      <ul id="categoryFilter">
        <li><button class="filter-btn active" data-filter="all">全部</button></li>
        <li><button class="filter-btn" data-filter="hair">发饰</button></li>
        <li><button class="filter-btn" data-filter="ear">耳饰</button></li>
        <li><button class="filter-btn" data-filter="brooch">胸针</button></li>
        <li><button class="filter-btn" data-filter="other">其他</button></li>
      </ul> <!-- 修正：添加了缺失的 closing </ul> tag -->
    </nav>
  </header>

  <main>
    <div class="products-grid" id="productsGrid">
      <!-- 产品卡片将通过 JavaScript 动态生成 -->
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
