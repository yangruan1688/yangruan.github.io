<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绒颜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 顶部导航 -->
        <nav class="top-nav">
            <button class="nav-btn active" data-category="全部">全部</button>
            <button class="nav-btn" data-category="发饰">发饰</button>
            <button class="nav-btn" data-category="耳饰">耳饰</button>
            <button class="nav-btn" data-category="胸针">胸针</button>
            <button class="nav-btn" data-category="其他">其他</button>
        </nav>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <span>🏷️ 价格</span>
        </div>

        <!-- 产品列表容器 -->
        <div id="product-grid" class="product-grid">
            <!-- 初始状态：加载中提示 -->
            <div id="loading-state" style="grid-column: 1 / -1; text-align: center; padding: 50px; color: #888;">
                <p>✨ 正在加载精美饰品...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
