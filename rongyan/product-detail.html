<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>产品详情</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fancyapps/fancybox@3.5.7/dist/jquery.fancybox.min.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body id="detail">
  <a href="index.html" class="back-button">&larr; 返回</a>

  <div class="detail-container" id="detailContainer">
    <div class="swiper-container">
      <div class="swiper-wrapper" id="swiperWrapper">
        <!-- 轮播图图片将通过 JavaScript 动态生成 -->
      </div>
      <!-- 左右切换按钮 -->
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
    </div>

    <h2 id="detailTitle" class="product-title">产品名称</h2>
    <p id="detailPrice" class="product-price">¥0.00</p>
    <p id="detailDescription" class="product-description">产品描述信息...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/fancyapps/fancybox@3.5.7/dist/jquery.fancybox.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
