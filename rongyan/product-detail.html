<!-- product-detail.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品详情</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-container {
            max-width: 800px;
            margin: 50px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .detail-image {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .detail-title { font-size: 2rem; margin-bottom: 10px; }
        .detail-price { font-size: 1.8rem; color: var(--price-color); margin-bottom: 20px; }
        .detail-desc { line-height: 1.6; color: var(--text-secondary); }
        .back-link { display: inline-block; margin-top: 30px; color: var(--text-main); text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container detail-container">
        <a href="index.html" class="back-link">← 返回商品列表</a>
        <div id="product-detail-content">
            <!-- 详情内容将由JS填充 -->
            <p>正在加载...</p>
        </div>
    </div>

    <script>
        // 复用主页面的产品数据
        const products = [
            { id: 1, name: "绒花 | 彼岸花", price: 428, image: "https://placehold.co/600x400/e63946/ffffff?text=彼岸花", desc: "这是一款精美的手工绒花彼岸花发饰，采用传统工艺制作，色彩鲜艳，造型独特。" },
            { id: 2, name: "绒花 | 丁香花", price: 488, image: "https://placehold.co/600x400/a2d2ff/ffffff?text=丁香花", desc: "淡雅的丁香花绒花，寓意着纯洁和初恋，非常适合搭配汉服或日常穿搭。" },
            { id: 3, name: "郁金香花束", price: 350, image: "https://placehold.co/600x400/ffb5a7/ffffff?text=郁金香", desc: "永不凋谢的郁金香花束，是送给朋友或家人的绝佳礼物，为生活增添一抹亮色。" },
            { id: 4, name: "蓝色妖姬胸针", price: 299, image: "https://placehold.co/600x400/0077b6/ffffff?text=蓝色妖姬", desc: "神秘而高贵的蓝色妖姬胸针，点缀在衣襟或围巾上，瞬间提升整体气质。" }
        ];

        // 从URL获取产品ID
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'), 10);

        // 查找对应的产品
        const product = products.find(p => p.id === productId);

        const detailContent = document.getElementById('product-detail-content');

        if (product) {
            // 如果找到产品，则渲染详情
            detailContent.innerHTML = `
                <img src="${product.image}" alt="${product.name}" class="detail-image">
                <h1 class="detail-title">${product.name}</h1>
                <p class="detail-price">¥${product.price}</p>
                <p class="detail-desc">${product.desc}</p>
            `;
        } else {
            // 如果没找到产品（例如ID无效）
            detailContent.innerHTML = `<h1>哎呀，找不到这个产品。</h1><p>请检查链接或返回列表页。</p>`;
        }
    </script>
</body>
</html>
