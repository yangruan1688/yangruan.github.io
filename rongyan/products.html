<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绒颜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 顶部导航栏 -->
        <nav class="top-nav">
            <button class="nav-btn active" data-category="all">全部</button>
            <button class="nav-btn" data-category="hair-accessories">发饰</button>
            <button class="nav-btn" data-category="earrings">耳饰</button>
            <button class="nav-btn" data-category="brooches">胸针</button>
            <button class="nav-btn" data-category="other">其他</button>
        </nav>

        <!-- 筛选和标题区域 -->
        <header class="page-header">
            <h1 class="page-title">全部作品</h1>
            <p class="item-count">共 <span id="total-items">4</span> 件</p>
        </header>

        <!-- 产品列表容器 -->
        <main class="product-grid" id="product-list">
            <!-- 产品卡片将由 JavaScript 动态生成并插入到这里 -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
